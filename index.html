<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="origin-when-cross-origin">

  <title>홍원사 지도</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: #ffffff;
      color: #111111;
    }

    .wrap {
      width: 100%;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 520px;
      border: 1px solid #dddddd;
      border-radius: 12px;
      background: #f5f5f5;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
      margin-bottom: 8px;
    }

    .buttons a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      background: #222222;
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      line-height: 1;
    }

    @media (max-width: 600px) {
      #map {
        height: 380px;
      }

      .buttons {
        gap: 8px;
        margin-top: 16px;
      }

      .buttons a {
        font-size: 14px;
        padding: 10px 16px;
      }
    }
  </style>

  <script>
    window.navermap_authFailure = function () {
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("map").innerHTML =
          '<div style="padding:30px; color:#d00000; font-weight:700;">네이버 지도 인증 실패</div>';
      });
    };
  </script>

  <!-- YOUR_CLIENT_ID 자리에 네이버 Client ID만 넣으세요. Client Secret은 넣지 않습니다. -->
  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=uyicxqd82e"></script>
</head>

<body>
  <main class="wrap">
    <div id="map"></div>

    <div class="buttons">
      <a href="https://map.naver.com/p/search/%ED%99%8D%EC%9B%90%EC%82%AC%20%EC%84%9C%EC%9A%B8%20%EA%B0%95%EC%84%9C%EA%B5%AC%20%EC%96%91%EC%B2%9C%EB%A1%9C49%EA%B8%B8%2056-12" target="_blank" rel="noopener">
        네이버 지도에서 보기
      </a>

      <a href="https://www.google.com/maps/search/?api=1&query=37.5721431,126.8406226" target="_blank" rel="noopener">
        Google Maps에서 보기
      </a>
    </div>
  </main>

  <script>
    const HONGWONSA_LAT = 37.5721431;
    const HONGWONSA_LNG = 126.8406226;

    try {
      const hongwonsa = new naver.maps.LatLng(HONGWONSA_LAT, HONGWONSA_LNG);

      const map = new naver.maps.Map("map", {
        center: hongwonsa,
        zoom: 17,
        mapTypeId: naver.maps.MapTypeId.NORMAL,
        zoomControl: true,
        zoomControlOptions: {
          position: naver.maps.Position.TOP_RIGHT
        },
        mapTypeControl: true
      });

      const marker = new naver.maps.Marker({
        position: hongwonsa,
        map: map,
        title: "홍원사"
      });

      const infoWindow = new naver.maps.InfoWindow({
        content:
          '<div style="padding:10px 16px; min-width:90px; text-align:center;">' +
          '<strong style="font-size:15px;">홍원사</strong>' +
          '</div>'
      });

      infoWindow.open(map, marker);

      naver.maps.Event.addListener(marker, "click", function () {
        infoWindow.open(map, marker);
      });

      setTimeout(function () {
        naver.maps.Event.trigger(map, "resize");
        map.setCenter(hongwonsa);
      }, 500);

      setTimeout(function () {
        naver.maps.Event.trigger(map, "resize");
        map.setCenter(hongwonsa);
      }, 1500);
    } catch (error) {
      console.error(error);
      document.getElementById("map").innerHTML =
        '<div style="padding:30px; color:#d00000; font-weight:700;">지도를 표시하는 중 오류가 발생했습니다.</div>';
    }
  </script>
</body>
</html>
