<div style="width:100%; max-width:760px; margin:0 auto; font-family:Arial, 'Noto Sans KR', sans-serif;">

  <div style="margin-bottom:14px; text-align:center;">
    <h3 style="margin:0 0 6px 0; font-size:24px; font-weight:700; color:#222;">
      홍원사 오시는 길
    </h3>
    <p style="margin:0; font-size:15px; color:#666; line-height:1.6;">
      서울특별시 강서구 양천로49길 56-12
    </p>
  </div>

  <div id="hongwonsa-map"
       style="width:100%; height:400px; border-radius:14px; overflow:hidden; border:1px solid #eeeeee; background:#f7f7f7;">
    <div id="hongwonsa-map-message"
         style="height:100%; display:flex; align-items:center; justify-content:center; text-align:center; color:#777; line-height:1.7; padding:20px;">
      지도를 불러오는 중입니다...
    </div>
  </div>

  <div style="margin-top:14px; text-align:center;">
    <a href="https://map.naver.com/p/search/%ED%99%8D%EC%9B%90%EC%82%AC%20%EC%84%9C%EC%9A%B8%ED%8A%B9%EB%B3%84%EC%8B%9C%20%EA%B0%95%EC%84%9C%EA%B5%AC%20%EC%96%91%EC%B2%9C%EB%A1%9C49%EA%B8%B8%2056-12"
       target="_blank"
       style="display:inline-block; padding:10px 18px; margin:4px; border-radius:999px; background:#222; color:#fff; text-decoration:none; font-size:14px;">
      네이버 지도에서 보기
    </a>

    <a href="https://www.google.com/maps/search/?api=1&query=%ED%99%8D%EC%9B%90%EC%82%AC%20%EC%84%9C%EC%9A%B8%ED%8A%B9%EB%B3%84%EC%8B%9C%20%EA%B0%95%EC%84%9C%EA%B5%AC%20%EC%96%91%EC%B2%9C%EB%A1%9C49%EA%B8%B8%2056-12"
       target="_blank"
       style="display:inline-block; padding:10px 18px; margin:4px; border-radius:999px; border:1px solid #cccccc; color:#222; text-decoration:none; font-size:14px;">
      Google Maps에서 보기
    </a>
  </div>

</div>

<script>
  window.navermap_authFailure = function () {
    var mapBox = document.getElementById("hongwonsa-map");
    mapBox.innerHTML =
      '<div style="height:100%; display:flex; align-items:center; justify-content:center; text-align:center; color:#777; line-height:1.7; padding:20px;">' +
      '<div>' +
      '<strong>네이버 지도 인증 실패</strong><br>' +
      'Client ID 또는 Web 서비스 URL을 확인해주세요.<br><br>' +
      '현재 등록해야 할 URL:<br>' +
      'https://1549180576-atari-embeds.googleusercontent.com' +
      '</div>' +
      '</div>';
  };

  function initHongwonsaMap() {
    var mapBox = document.getElementById("hongwonsa-map");
    mapBox.innerHTML = "";

    var hongwonsa = new naver.maps.LatLng(37.5721431, 126.8406226);

    var map = new naver.maps.Map("hongwonsa-map", {
      center: hongwonsa,
      zoom: 17,
      mapTypeControl: false,
      scaleControl: false,
      logoControl: true,
      mapDataControl: false,
      zoomControl: true,
      zoomControlOptions: {
        position: naver.maps.Position.TOP_RIGHT
      }
    });

    var marker = new naver.maps.Marker({
      position: hongwonsa,
      map: map,
      title: "홍원사"
    });

    var infoWindow = new naver.maps.InfoWindow({
      content:
        '<div style="padding:10px 14px; font-size:14px; line-height:1.5; color:#222;">' +
        '<strong>홍원사</strong><br>' +
        '서울특별시 강서구 양천로49길 56-12' +
        '</div>'
    });

    infoWindow.open(map, marker);

    naver.maps.Event.addListener(marker, "click", function () {
      if (infoWindow.getMap()) {
        infoWindow.close();
      } else {
        infoWindow.open(map, marker);
      }
    });

    setTimeout(function () {
      naver.maps.Event.trigger(map, "resize");
      map.setCenter(hongwonsa);
    }, 800);
  }
</script>

<script type="text/javascript"
  src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=uyicxqd82e&callback=initHongwonsaMap">
</script>
