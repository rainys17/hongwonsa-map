<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홍원사 오시는 길</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #ffffff;
      color: #222222;
    }

    .wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 32px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
    }

    .title p {
      margin: 0;
      font-size: 16px;
      color: #666666;
      line-height: 1.6;
    }

    #map {
      width: 100%;
      height: 440px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #eeeeee;
      background: #f7f7f7;
      box-sizing: border-box;
    }

    .message {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #777777;
      line-height: 1.7;
      padding: 24px;
      box-sizing: border-box;
      font-size: 15px;
    }

    .buttons {
      margin-top: 18px;
      text-align: center;
    }

    .buttons a {
      display: inline-block;
      padding: 11px 20px;
      margin: 5px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 15px;
      line-height: 1.2;
    }

    .btn-naver {
      background: #222222;
      color: #ffffff;
    }

    .btn-google {
      border: 1px solid #cccccc;
      color: #222222;
      background: #ffffff;
    }

    #status {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #eeeeee;
      border-radius: 10px;
      background: #fafafa;
      color: #666666;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="title">
      <h1>홍원사 오시는 길</h1>
      <p>서울특별시 강서구 양천로49길 56-12</p>
    </div>

    <div id="map">
      <div class="message">
        지도를 불러오는 중입니다...
      </div>
    </div>

    <div class="buttons">
      <a class="btn-naver"
         href="https://map.naver.com/p/search/%ED%99%8D%EC%9B%90%EC%82%AC%20%EC%84%9C%EC%9A%B8%ED%8A%B9%EB%B3%84%EC%8B%9C%20%EA%B0%95%EC%84%9C%EA%B5%AC%20%EC%96%91%EC%B2%9C%EB%A1%9C49%EA%B8%B8%2056-12"
         target="_blank"
         rel="noopener noreferrer">
        네이버 지도에서 보기
      </a>

      <a class="btn-google"
         href="https://www.google.com/maps/search/?api=1&query=%ED%99%8D%EC%9B%90%EC%82%AC%20%EC%84%9C%EC%9A%B8%ED%8A%B9%EB%B3%84%EC%8B%9C%20%EA%B0%95%EC%84%9C%EA%B5%AC%20%EC%96%91%EC%B2%9C%EB%A1%9C49%EA%B8%B8%2056-12"
         target="_blank"
         rel="noopener noreferrer">
        Google Maps에서 보기
      </a>
    </div>

    <div id="status">
      상태: HTML 로드 완료
    </div>
  </div>

  <script>
    /*
      =========================================================
      여기 한 곳만 수정하세요.
      Client Secret이 아니라 Client ID를 넣어야 합니다.
      =========================================================
    */

    const NAVER_CLIENT_ID = "uyicxqd82e";

    /*
      =========================================================
      아래는 수정하지 마세요.
      =========================================================
    */

    const HONGWONSA_LAT = 37.5721431;
    const HONGWONSA_LNG = 126.8406226;

    function setStatus(message) {
      const statusBox = document.getElementById("status");
      if (statusBox) {
        statusBox.innerHTML = message;
      }
    }

    function showMapMessage(message) {
      const mapBox = document.getElementById("map");
      if (mapBox) {
        mapBox.innerHTML =
          '<div class="message"><div>' + message + '</div></div>';
      }
    }

    window.navermap_authFailure = function () {
      showMapMessage(
        '<strong>네이버 지도 인증 실패</strong><br>' +
        'Client ID 또는 네이버 콘솔의 Web 서비스 URL을 확인해야 합니다.'
      );

      setStatus(
        '<strong>인증 실패</strong><br>' +
        '현재 실행 주소: ' + window.location.origin + '<br>' +
        '네이버 콘솔 Web 서비스 URL에 이 주소가 등록되어 있어야 합니다.'
      );
    };

    window.initHongwonsaMap = function () {
      try {
        setStatus(
          '상태: 네이버 지도 스크립트 로드 완료<br>' +
          '현재 실행 주소: ' + window.location.origin
        );

        const position = new naver.maps.LatLng(HONGWONSA_LAT, HONGWONSA_LNG);

        const map = new naver.maps.Map("map", {
          center: position,
          zoom: 17,
          mapTypeControl: false,
          scaleControl: false,
          logoControl: true,
          mapDataControl: false,
          zoomControl: true,
          zoomControlOptions: {
            position: naver.maps.Position.TOP_RIGHT
          }
        });

        const marker = new naver.maps.Marker({
          position: position,
          map: map,
          title: "홍원사"
        });

        const infoWindow = new naver.maps.InfoWindow({
          content:
            '<div style="padding:10px 14px; font-size:14px; line-height:1.5; color:#222;">' +
            '<strong>홍원사</strong><br>' +
            '서울특별시 강서구 양천로49길 56-12' +
            '</div>'
        });

        infoWindow.open(map, marker);

        naver.maps.Event.addListener(marker, "click", function () {
          if (infoWindow.getMap()) {
            infoWindow.close();
          } else {
            infoWindow.open(map, marker);
          }
        });

        setTimeout(function () {
          naver.maps.Event.trigger(map, "resize");
          map.setCenter(position);
        }, 700);

        setStatus(
          '<strong>지도 생성 완료</strong><br>' +
          '현재 실행 주소: ' + window.location.origin + '<br>' +
          '위도: ' + HONGWONSA_LAT + '<br>' +
          '경도: ' + HONGWONSA_LNG
        );

      } catch (error) {
        showMapMessage(
          '<strong>지도 실행 오류</strong><br>' +
          '지도 스크립트는 불러왔지만 지도를 표시하는 중 문제가 발생했습니다.'
        );

        setStatus(
          '<strong>지도 실행 오류</strong><br>' +
          String(error && error.message ? error.message : error) + '<br><br>' +
          '현재 실행 주소: ' + window.location.origin
        );
      }
    };

    function loadNaverMapScript() {
      if (!NAVER_CLIENT_ID || NAVER_CLIENT_ID === "YOUR_CLIENT_ID_HERE") {
        showMapMessage(
          '<strong>Client ID가 입력되지 않았습니다.</strong><br>' +
          'HTML 상단의 NAVER_CLIENT_ID 부분에 Client ID를 넣어주세요.'
        );

        setStatus(
          '<strong>Client ID 미입력</strong><br>' +
          'Client Secret이 아니라 Client ID를 넣어야 합니다.'
        );
        return;
      }

      const script = document.createElement("script");
      script.type = "text/javascript";
      script.src =
        "https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=" +
        encodeURIComponent(NAVER_CLIENT_ID) +
        "&callback=initHongwonsaMap";

      script.onerror = function () {
        showMapMessage(
          '<strong>네이버 지도 스크립트를 불러오지 못했습니다.</strong><br>' +
          'Client ID, Dynamic Map 활성화, Web 서비스 URL을 확인해주세요.'
        );

        setStatus(
          '<strong>스크립트 로드 실패</strong><br>' +
          '현재 실행 주소: ' + window.location.origin
        );
      };

      document.body.appendChild(script);
    }

    loadNaverMapScript();
  </script>
</body>
</html>
