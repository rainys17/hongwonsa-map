<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>홍원사 오시는 길</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: #ffffff;
      color: #222222;
    }

    .wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .address {
      margin: 0 0 14px;
      font-size: 15px;
      line-height: 1.5;
      color: #555555;
    }

    #map {
      width: 100%;
      height: 420px;
      border: 1px solid #dddddd;
      border-radius: 12px;
      overflow: hidden;
      background: #f5f5f5;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .buttons a {
      display: inline-block;
      padding: 9px 13px;
      border-radius: 999px;
      background: #222222;
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      line-height: 1;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #777777;
    }

    .error {
      color: #c62828;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .wrap {
        padding: 14px;
      }

      h1 {
        font-size: 20px;
      }

      #map {
        height: 360px;
      }

      .buttons a {
        font-size: 13px;
        padding: 8px 11px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>홍원사 오시는 길</h1>

    <p class="address">
      서울특별시 강서구 양천로49길 56-12
    </p>

    <div id="map">지도를 불러오는 중입니다...</div>

    <div class="buttons">
      <a href="https://map.naver.com/p/search/%ED%99%8D%EC%9B%90%EC%82%AC%20%EC%84%9C%EC%9A%B8%20%EA%B0%95%EC%84%9C%EA%B5%AC%20%EC%96%91%EC%B2%9C%EB%A1%9C49%EA%B8%B8%2056-12" target="_blank" rel="noopener">
        네이버 지도에서 보기
      </a>

      <a href="https://www.google.com/maps/search/?api=1&query=37.5721431,126.8406226" target="_blank" rel="noopener">
        Google Maps에서 보기
      </a>
    </div>

    <div id="status" class="status">상태: HTML 로드 완료</div>
  </main>

  <script>
    /*
      여기에 네이버 Client ID만 넣으세요.
      Client Secret은 넣지 않습니다.
    */
    const NAVER_CLIENT_ID = "uyicxqd82e";

    const HONGWONSA_LAT = 37.5721431;
    const HONGWONSA_LNG = 126.8406226;

    function setStatus(message, isError = false) {
      const status = document.getElementById("status");
      status.textContent = "상태: " + message;
      status.className = isError ? "status error" : "status";
    }

    window.navermap_authFailure = function () {
      setStatus("네이버 지도 인증 실패 - Client ID 또는 Web 서비스 URL 설정을 확인하세요.", true);
      document.getElementById("map").innerHTML =
        "네이버 지도 인증에 실패했습니다.<br>Client ID와 Web 서비스 URL을 확인해 주세요.";
    };

    window.initHongwonsaMap = function () {
      try {
        const hongwonsa = new naver.maps.LatLng(HONGWONSA_LAT, HONGWONSA_LNG);

        const map = new naver.maps.Map("map", {
          center: hongwonsa,
          zoom: 17,
          zoomControl: true,
          zoomControlOptions: {
            position: naver.maps.Position.TOP_RIGHT
          },
          mapTypeControl: true
        });

        const marker = new naver.maps.Marker({
          position: hongwonsa,
          map: map,
          title: "홍원사"
        });

        const infoWindow = new naver.maps.InfoWindow({
          content: `
            <div style="padding:10px 14px; min-width:180px; line-height:1.45;">
              <strong style="font-size:15px;">홍원사</strong><br>
              <span style="font-size:13px; color:#555;">
                서울특별시 강서구 양천로49길 56-12
              </span>
            </div>
          `
        });

        infoWindow.open(map, marker);

        naver.maps.Event.addListener(marker, "click", function () {
          infoWindow.open(map, marker);
        });

        setStatus("네이버 지도 로드 완료");
      } catch (error) {
        console.error(error);
        setStatus("지도 초기화 오류 - 브라우저 개발자도구 Console 확인 필요", true);
        document.getElementById("map").innerHTML =
          "지도를 표시하는 중 오류가 발생했습니다.";
      }
    };

    function loadNaverMapScript() {
      if (!NAVER_CLIENT_ID || NAVER_CLIENT_ID.includes("여기에")) {
        setStatus("Client ID가 아직 입력되지 않았습니다.", true);
        document.getElementById("map").innerHTML =
          "index.html에서 NAVER_CLIENT_ID를 입력해 주세요.";
        return;
      }

      const script = document.createElement("script");
      script.type = "text/javascript";
      script.src =
        "https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=" +
        encodeURIComponent(NAVER_CLIENT_ID) +
        "&callback=initHongwonsaMap";
      script.onerror = function () {
        setStatus("네이버 지도 스크립트 로드 실패", true);
        document.getElementById("map").innerHTML =
          "네이버 지도 스크립트를 불러오지 못했습니다.";
      };

      document.head.appendChild(script);
    }

    loadNaverMapScript();
  </script>
</body>
</html>
